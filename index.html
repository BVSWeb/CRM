<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理系统</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f1efe8;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6a65; --text3: #9b9a95;
    --radius: 10px; --radius-lg: 14px;
    --accent: #378ADD; --accent-bg: rgba(55,138,221,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
      --text: #f0efe8; --text2: #a0a09a; --text3: #6b6a65;
    }
  }
  body { font-family: -apple-system,'PingFang SC','Hiragino Sans GB',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ── Login ── */
  #login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .login-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:2.5rem 2rem; width:100%; max-width:360px; }
  .login-logo { width:44px; height:44px; background:var(--text); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem; color:var(--bg); font-size:20px; }
  .login-card h2 { font-size:20px; font-weight:500; margin-bottom:4px; }
  .login-card > p { font-size:13px; color:var(--text2); margin-bottom:1.75rem; }
  .email-display { background:var(--surface2); border:0.5px solid var(--border); border-radius:var(--radius); padding:9px 12px; font-size:13px; color:var(--text2); margin-bottom:1rem; display:flex; align-items:center; gap:8px; }
  .email-display i { font-size:15px; color:var(--text3); }
  .pw-wrap { position:relative; margin-bottom:0.6rem; }
  .pw-wrap input { width:100%; padding:9px 38px 9px 12px; font-size:14px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); outline:none; font-family:inherit; }
  .pw-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-bg); }
  .pw-toggle { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text3); font-size:16px; padding:2px; }
  .login-err { font-size:12px; color:#A32D2D; margin-bottom:0.75rem; min-height:18px; }
  .btn-login { width:100%; padding:10px; font-size:14px; font-weight:500; background:var(--text); color:var(--bg); border:none; border-radius:var(--radius); cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity 0.15s; }
  .btn-login:hover { opacity:0.85; }
  .btn-login:disabled { opacity:0.5; cursor:not-allowed; }

  /* ── App ── */
  #app-page { display:none; }
  .app { max-width:860px; margin:0 auto; padding:2rem 1.25rem; }
  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.75rem; gap:12px; flex-wrap:wrap; }
  .header h1 { font-size:22px; font-weight:500; }
  .header > div > p { font-size:13px; color:var(--text2); margin-top:3px; }
  .header-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .user-pill { font-size:12px; color:var(--text2); background:var(--surface2); border:0.5px solid var(--border); border-radius:20px; padding:5px 10px; display:flex; align-items:center; gap:5px; }

  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin-bottom:1.5rem; }
  .stat { background:var(--surface2); border-radius:var(--radius); padding:0.85rem 1rem; }
  .stat-label { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:5px; margin-bottom:4px; }
  .stat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .stat-value { font-size:22px; font-weight:500; }

  .controls { display:flex; gap:10px; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
  .search-wrap { position:relative; flex:1; min-width:180px; }
  .search-wrap i { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--text3); pointer-events:none; }
  .search-wrap input { width:100%; padding:8px 12px 8px 34px; font-size:14px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); outline:none; }
  .search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-bg); }

  .filter-tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .ftab { font-size:12px; padding:6px 12px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; transition:all 0.15s; font-family:inherit; }
  .ftab.active { background:var(--text); color:var(--bg); border-color:var(--text); }
  .ftab:hover:not(.active) { background:var(--surface2); }

  .user-list { display:flex; flex-direction:column; gap:8px; }
  .user-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; display:flex; align-items:center; gap:14px; transition:border-color 0.15s; }
  .user-card:hover { border-color:var(--border2); }
  .avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:500; font-size:14px; flex-shrink:0; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:14px; font-weight:500; }
  .user-meta { font-size:12px; color:var(--text2); margin-top:4px; display:flex; gap:14px; flex-wrap:wrap; }
  .user-meta span { display:flex; align-items:center; gap:4px; }
  .badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; white-space:nowrap; flex-shrink:0; }
  .actions { display:flex; gap:6px; flex-shrink:0; }
  .icon-btn { width:30px; height:30px; border-radius:var(--radius); border:0.5px solid var(--border); background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text2); font-size:15px; transition:all 0.15s; }
  .icon-btn:hover { background:var(--surface2); color:var(--text); }
  .icon-btn.danger:hover { color:#A32D2D; }

  .empty { text-align:center; padding:4rem 1rem; color:var(--text2); font-size:14px; background:var(--surface); border-radius:var(--radius-lg); border:0.5px solid var(--border); }
  .empty i { font-size:36px; display:block; margin-bottom:10px; color:var(--text3); }
  .loading { text-align:center; padding:3rem; color:var(--text2); font-size:14px; }
  .spinner { width:24px; height:24px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 10px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .btn { padding:7px 14px; font-size:13px; border-radius:var(--radius); cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px; transition:all 0.15s; border:0.5px solid var(--border2); background:var(--surface); color:var(--text2); }
  .btn:hover { background:var(--surface2); }
  .btn-primary { background:var(--text); color:var(--bg); border-color:var(--text); }
  .btn-primary:hover { opacity:0.85; }

  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:200; padding:1rem; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:var(--radius-lg); border:0.5px solid var(--border); width:100%; max-width:440px; padding:1.5rem; animation:slideUp 0.2s ease; }
  @keyframes slideUp { from { transform:translateY(10px); opacity:0; } to { transform:none; opacity:1; } }
  .modal h3 { font-size:16px; font-weight:500; margin-bottom:1.25rem; }
  .form-group { margin-bottom:1rem; }
  .form-group label { font-size:12px; color:var(--text2); display:block; margin-bottom:5px; }
  .form-group input, .form-group select { width:100%; padding:8px 10px; font-size:14px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); outline:none; font-family:inherit; }
  .form-group input:focus, .form-group select:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-bg); }
  .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:1.25rem; }

  .status-list-ui { display:flex; flex-direction:column; gap:6px; margin-bottom:1rem; max-height:220px; overflow-y:auto; }
  .status-item-ui { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-radius:var(--radius); border:0.5px solid var(--border); }
  .status-name-ui { font-size:13px; display:flex; align-items:center; gap:8px; }
  .add-status-row { display:flex; gap:8px; align-items:center; }
  .add-status-row input { flex:1; padding:7px 10px; font-size:13px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); outline:none; font-family:inherit; }
  .color-opts { display:flex; gap:5px; }
  .color-opt { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:border-color 0.15s; flex-shrink:0; }
  .color-opt.sel { border-color:var(--text); }

  .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:9px 18px; border-radius:var(--radius); font-size:13px; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-users"></i></div>
    <h2>用户管理系统</h2>
    <p>请输入密码以继续</p>
    <div class="email-display">
      <i class="ti ti-mail"></i>
      <span id="show-email">—</span>
    </div>
    <div class="pw-wrap">
      <input type="password" id="login-pw" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" aria-label="显示/隐藏密码">
        <i class="ti ti-eye" id="pw-eye"></i>
      </button>
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <i class="ti ti-login"></i> 登录
    </button>
  </div>
</div>

<!-- ── App ── -->
<div id="app-page">
  <div class="app">
    <div class="header">
      <div>
        <h1>用户管理</h1>
        <p id="total-label">正在加载…</p>
      </div>
      <div class="header-actions">
        <div class="user-pill"><i class="ti ti-user" style="font-size:13px"></i><span id="authed-email"></span></div>
        <button class="btn" onclick="doLogout()"><i class="ti ti-logout"></i>退出</button>
        <button class="btn" onclick="openStatusModal()"><i class="ti ti-tag"></i>管理分类</button>
        <button class="btn btn-primary" onclick="openAddModal()"><i class="ti ti-plus"></i>添加用户</button>
      </div>
    </div>
    <div class="stats" id="stats-row"><div class="stat"><div class="stat-label">加载中…</div><div class="stat-value">—</div></div></div>
    <div class="controls">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="search-input" placeholder="搜索用户名、电话、微信…" oninput="renderList()">
      </div>
      <div class="filter-tabs" id="filter-tabs"></div>
    </div>
    <div class="user-list" id="user-list">
      <div class="loading"><div class="spinner"></div>正在连接数据库…</div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="add-modal" onclick="bgClose(event,'add-modal')">
  <div class="modal">
    <h3 id="modal-title">添加用户</h3>
    <div class="form-group"><label>用户名 *</label><input id="f-name" type="text" placeholder="请输入用户名"></div>
    <div class="form-group"><label>地址</label><input id="f-addr" type="text" placeholder="请输入地址"></div>
    <div class="form-group"><label>电话</label><input id="f-phone" type="text" placeholder="请输入电话"></div>
    <div class="form-group"><label>微信号</label><input id="f-wechat" type="text" placeholder="请输入微信号"></div>
    <div class="form-group"><label>分类</label><select id="f-status"></select></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('add-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveUser()"><span id="save-btn-text">保存</span></button>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="overlay" id="status-modal" onclick="bgClose(event,'status-modal')">
  <div class="modal" style="max-width:380px;">
    <h3>管理分类</h3>
    <div class="status-list-ui" id="status-list-ui"></div>
    <div class="add-status-row">
      <input type="text" id="new-status-name" placeholder="新分类名称">
      <div class="color-opts" id="color-opts"></div>
      <button class="btn btn-primary" onclick="addStatus()" style="padding:7px 12px;font-size:12px;">添加</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal('status-modal')">完成</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                             from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
         onSnapshot, query, orderBy, serverTimestamp, getDocs }
                             from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

// ╔══════════════════════════════════╗
// ║  在此修改登录邮件（密码在 Firebase Auth 里设置）║
const LOGIN_EMAIL = "admin@bvsweb.com";
// ╚══════════════════════════════════╝

const firebaseConfig = {
  apiKey: "AIzaSyDIauAyJWlfqhDs8fIAjr-I6vtCG3EKCxc",
  authDomain: "bvsweb-83051.firebaseapp.com",
  projectId: "bvsweb-83051",
  storageBucket: "bvsweb-83051.firebasestorage.app",
  messagingSenderId: "449976422801",
  appId: "1:449976422801:web:79d0b243dc6fcf9df28a30",
  measurementId: "G-J8QXB99N1M"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// Show email on login screen
document.getElementById('show-email').textContent = LOGIN_EMAIL;

// ── Auth actions ─────────────────────────────────────────
window.doLogin = async () => {
  const pw  = document.getElementById('login-pw').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  if (!pw) { err.textContent = '请输入密码'; return; }
  err.textContent = '';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;margin:0;border-width:2px;display:inline-block"></div> 登录中…';
  try {
    await signInWithEmailAndPassword(auth, LOGIN_EMAIL, pw);
  } catch(e) {
    const code = e.code;
    err.textContent =
      code === 'auth/wrong-password'      || code === 'auth/invalid-credential' ? '密码错误，请重试' :
      code === 'auth/too-many-requests'   ? '尝试次数过多，请稍后再试' :
      code === 'auth/user-not-found'      ? '该账号不存在' :
      '登录失败：' + e.message;
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> 登录';
  }
};

window.doLogout = async () => { await signOut(auth); };

window.togglePw = () => {
  const inp  = document.getElementById('login-pw');
  const icon = document.getElementById('pw-eye');
  const show = inp.type === 'password';
  inp.type       = show ? 'text' : 'password';
  icon.className = show ? 'ti ti-eye-off' : 'ti ti-eye';
};

// ── Auth state ───────────────────────────────────────────
let unsubStatuses = null, unsubUsers = null;

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('login-page').style.display  = 'none';
    document.getElementById('app-page').style.display    = 'block';
    document.getElementById('login-pw').value            = '';
    document.getElementById('authed-email').textContent  = user.email;
    startListeners();
  } else {
    document.getElementById('login-page').style.display  = 'flex';
    document.getElementById('app-page').style.display    = 'none';
    document.getElementById('login-btn').disabled        = false;
    document.getElementById('login-btn').innerHTML       = '<i class="ti ti-login"></i> 登录';
    if (unsubStatuses) { unsubStatuses(); unsubStatuses = null; }
    if (unsubUsers)    { unsubUsers();    unsubUsers    = null; }
  }
});

// ── Firestore ────────────────────────────────────────────
const COLORS = [
  { bg:'#FCEBEB', tx:'#791F1F', dot:'#E24B4A' },
  { bg:'#E6F1FB', tx:'#0C447C', dot:'#378ADD' },
  { bg:'#E1F5EE', tx:'#085041', dot:'#1D9E75' },
  { bg:'#FAEEDA', tx:'#633806', dot:'#BA7517' },
  { bg:'#EEEDFE', tx:'#3C3489', dot:'#7F77DD' },
  { bg:'#EAF3DE', tx:'#27500A', dot:'#639922' },
];
const AVATAR_BG = ['#B5D4F4','#9FE1CB','#FAC775','#F4C0D1','#CECBF6','#C0DD97'];
const AVATAR_TX = ['#0C447C','#085041','#633806','#72243E','#3C3489','#27500A'];

let users = [], statuses = [];
let activeFilter = 'all', editingId = null, selectedColor = COLORS[0];

async function seedStatuses() {
  const snap = await getDocs(collection(db,'statuses'));
  if (snap.empty) {
    const defaults = [
      { label:'未处理',  color:COLORS[0], order:0 },
      { label:'初步联系', color:COLORS[1], order:1 },
      { label:'接单',    color:COLORS[2], order:2 },
    ];
    for (const s of defaults) await addDoc(collection(db,'statuses'), s);
  }
}

function startListeners() {
  seedStatuses();
  unsubStatuses = onSnapshot(collection(db,'statuses'), snap => {
    statuses = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    statuses.sort((a,b) => (a.order||0)-(b.order||0));
    renderAll();
  });
  unsubUsers = onSnapshot(query(collection(db,'users'), orderBy('createdAt','desc')), snap => {
    users = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderAll();
  });
}

// ── Render ───────────────────────────────────────────────
function renderAll() {
  document.getElementById('total-label').textContent = `共 ${users.length} 位用户`;
  const rows = [
    { label:'全部', value:users.length, dot:'#888780' },
    ...statuses.map(s => ({ label:s.label, value:users.filter(u=>u.statusId===s.id).length, dot:s.color?.dot||'#888' }))
  ];
  document.getElementById('stats-row').innerHTML = rows.map(r => `
    <div class="stat">
      <div class="stat-label"><span class="stat-dot" style="background:${r.dot}"></span>${r.label}</div>
      <div class="stat-value">${r.value}</div>
    </div>`).join('');
  const tabs = [{ id:'all', label:'全部' }, ...statuses.map(s => ({ id:s.id, label:s.label }))];
  document.getElementById('filter-tabs').innerHTML = tabs.map(t =>
    `<button class="ftab ${activeFilter===t.id?'active':''}" onclick="window._sf(${JSON.stringify(t.id)})">${t.label}</button>`
  ).join('');
  renderList();
}

window.renderList = function() {
  const q = (document.getElementById('search-input').value||'').trim().toLowerCase();
  const list = users.filter(u => {
    const mQ = !q || [u.name,u.phone,u.wechat,u.addr].some(v => v&&v.toLowerCase().includes(q));
    const mF = activeFilter==='all' || u.statusId===activeFilter;
    return mQ && mF;
  });
  const el = document.getElementById('user-list');
  if (!list.length) { el.innerHTML=`<div class="empty"><i class="ti ti-users"></i>暂无用户</div>`; return; }
  el.innerHTML = list.map((u,i) => {
    const s  = statuses.find(x=>x.id===u.statusId)||{ label:'未分类', color:COLORS[0] };
    const bg = AVATAR_BG[i%AVATAR_BG.length], tx = AVATAR_TX[i%AVATAR_TX.length];
    return `<div class="user-card">
      <div class="avatar" style="background:${bg};color:${tx}">${(u.name||'?').slice(0,2)}</div>
      <div class="user-info">
        <div class="user-name">${u.name||''}</div>
        <div class="user-meta">
          ${u.addr  ?`<span><i class="ti ti-map-pin" style="font-size:13px"></i>${u.addr}</span>`:''}
          ${u.phone ?`<span><i class="ti ti-phone" style="font-size:13px"></i>${u.phone}</span>`:''}
          ${u.wechat?`<span><i class="ti ti-brand-wechat" style="font-size:13px"></i>${u.wechat}</span>`:''}
        </div>
      </div>
      <span class="badge" style="background:${s.color?.bg};color:${s.color?.tx}">${s.label}</span>
      <div class="actions">
        <button class="icon-btn" onclick="window._eu('${u.id}')" aria-label="编辑"><i class="ti ti-edit"></i></button>
        <button class="icon-btn danger" onclick="window._du('${u.id}')" aria-label="删除"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
};

function renderStatusListUI() {
  document.getElementById('status-list-ui').innerHTML = statuses.map(s => `
    <div class="status-item-ui">
      <span class="status-name-ui">
        <span style="width:10px;height:10px;border-radius:50%;background:${s.color?.dot};display:inline-block"></span>
        ${s.label}
      </span>
      <button class="icon-btn danger" onclick="window._ds('${s.id}')" aria-label="删除"><i class="ti ti-x" style="font-size:13px"></i></button>
    </div>`).join('');
}

function renderColorOpts() {
  document.getElementById('color-opts').innerHTML = COLORS.map((c,i) =>
    `<div class="color-opt ${c===selectedColor?'sel':''}" style="background:${c.dot}" onclick="window._sc(${i})"></div>`
  ).join('');
}

// ── Actions ──────────────────────────────────────────────
window._sf = id => { activeFilter=id; renderAll(); };
window._sc = i  => { selectedColor=COLORS[i]; renderColorOpts(); };

window._eu = id => {
  const u = users.find(x=>x.id===id); if(!u) return;
  editingId=id;
  document.getElementById('modal-title').textContent='编辑用户';
  document.getElementById('f-name').value  = u.name||'';
  document.getElementById('f-addr').value  = u.addr||'';
  document.getElementById('f-phone').value = u.phone||'';
  document.getElementById('f-wechat').value= u.wechat||'';
  refreshStatusSelect(u.statusId);
  openModal('add-modal');
};

window._du = async id => {
  if(!confirm('确认删除该用户？')) return;
  await deleteDoc(doc(db,'users',id));
  toast('已删除用户');
};

window._ds = async id => {
  if(users.some(u=>u.statusId===id)){ alert('该分类下还有用户，无法删除'); return; }
  await deleteDoc(doc(db,'statuses',id));
  toast('已删除分类'); renderStatusListUI();
};

window.openAddModal = () => {
  editingId=null;
  document.getElementById('modal-title').textContent='添加用户';
  ['f-name','f-addr','f-phone','f-wechat'].forEach(id=>document.getElementById(id).value='');
  refreshStatusSelect(); openModal('add-modal');
};

window.saveUser = async () => {
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('请输入用户名'); return; }
  document.getElementById('save-btn-text').textContent='保存中…';
  const data = {
    name, addr:document.getElementById('f-addr').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    wechat:document.getElementById('f-wechat').value.trim(),
    statusId:document.getElementById('f-status').value,
  };
  try {
    if(editingId){ await updateDoc(doc(db,'users',editingId),data); toast('已更新用户'); }
    else { data.createdAt=serverTimestamp(); await addDoc(collection(db,'users'),data); toast('已添加用户'); }
    closeModal('add-modal');
  } catch(e){ alert('保存失败：'+e.message); }
  document.getElementById('save-btn-text').textContent='保存';
};

window.openStatusModal = () => { renderStatusListUI(); renderColorOpts(); openModal('status-modal'); };

window.addStatus = async () => {
  const name = document.getElementById('new-status-name').value.trim();
  if(!name){ alert('请输入分类名称'); return; }
  await addDoc(collection(db,'statuses'),{ label:name, color:selectedColor, order:statuses.length });
  document.getElementById('new-status-name').value='';
  toast('已添加分类'); renderStatusListUI();
};

function refreshStatusSelect(selId) {
  document.getElementById('f-status').innerHTML = statuses.map(s=>
    `<option value="${s.id}" ${s.id===selId?'selected':''}>${s.label}</option>`).join('');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
window.closeModal = id => document.getElementById(id).classList.remove('open');
window.bgClose = (e,id) => { if(e.target.id===id) window.closeModal(id); };

function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
</script>
</body>
</html>
