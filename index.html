<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理系统 Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f1efe8;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6a65; --text3: #9b9a95;
    --radius: 10px; --radius-lg: 14px;
    --accent: #378ADD; --accent-bg: rgba(55,138,221,0.12);
    --whatsapp: #25D366;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
      --text: #f0efe8; --text2: #a0a09a; --text3: #6b6a65;
    }
  }
  body { font-family: -apple-system, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .app { max-width:900px; margin:0 auto; padding:2rem 1.25rem; }
  
  /* Header & Stats */
  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.5rem; gap:12px; flex-wrap:wrap; }
  .header-actions { display:flex; gap:8px; align-items:center; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:1.5rem; }
  .stat { background:var(--surface2); border-radius:var(--radius); padding:0.85rem 1rem; }
  .stat-label { font-size:12px; color:var(--text2); margin-bottom:4px; display:flex; align-items:center; gap:5px; }
  .stat-dot { width:8px; height:8px; border-radius:50%; }
  .stat-value { font-size:22px; font-weight:500; }

  /* Controls */
  .controls { display:flex; gap:10px; margin-bottom:1rem; flex-wrap:wrap; }
  .search-wrap { position:relative; flex:1; min-width:200px; }
  .search-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text3); }
  .search-wrap input { width:100%; padding:10px 10px 10px 38px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--surface); color:var(--text); outline:none; }
  .filter-tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .ftab { font-size:12px; padding:8px 14px; border-radius:var(--radius); border:0.5px solid var(--border2); cursor:pointer; background:transparent; color:var(--text2); }
  .ftab.active { background:var(--text); color:var(--bg); }

  /* User Cards */
  .user-list { display:flex; flex-direction:column; gap:10px; }
  .user-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; display:flex; align-items:center; gap:16px; transition:0.2s; }
  .user-card:hover { border-color:var(--accent); }
  .avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; flex-shrink:0; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:15px; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:6px; cursor:pointer; }
  .user-name:hover { color: var(--accent); }
  .user-meta { font-size:12px; color:var(--text2); display:flex; gap:12px; flex-wrap:wrap; }
  .user-meta span { display:flex; align-items:center; gap:4px; }
  
  /* Action Buttons */
  .actions { display:flex; gap:8px; align-items:center; }
  .btn-wa { background: var(--whatsapp); color: white !important; border: none; font-weight: 500; padding: 7px 12px; }
  .btn-wa:hover { opacity: 0.9; }
  .icon-btn { width:34px; height:34px; border-radius:var(--radius); border:0.5px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text2); transition:0.2s; }
  .icon-btn:hover { background:var(--surface2); color:var(--text); }
  .icon-btn.danger:hover { color:#A32D2D; border-color:#A32D2D; }

  /* Modals & UI */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:200; padding:1rem; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:var(--radius-lg); width:100%; max-width:440px; padding:1.5rem; }
  .form-group { margin-bottom:1rem; }
  .form-group label { font-size:12px; color:var(--text2); display:block; margin-bottom:5px; }
  .form-group input, .form-group select { width:100%; padding:10px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--surface); color:var(--text); outline:none; }
  .pagination { display:flex; justify-content:center; align-items:center; gap:20px; margin-top:2rem; }
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:10px 20px; border-radius:var(--radius); font-size:13px; opacity:0; transition:0.3s; z-index:999; }
  .toast.show { opacity:1; }
  .badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; }
  
  /* Color Options */
  .color-opts { display:flex; gap:8px; margin-top:5px; }
  .color-opt { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .color-opt.sel { border-color: var(--text); }
</style>
</head>
<body>

<div id="login-page">
  <div class="login-card" style="margin: auto;">
    <div class="login-logo"><i class="ti ti-lock"></i></div>
    <h2>管理登录</h2>
    <div class="pw-wrap" style="margin-top: 20px;">
      <input type="password" id="login-pw" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()" style="margin-top: 10px;">登录</button>
  </div>
</div>

<div id="app-page" style="display:none;">
  <div class="app">
    <div class="header">
      <div>
        <h1 id="total-label">用户管理</h1>
        <p style="font-size:13px; color:var(--text2)">点击店名跳转 Google Maps | 点击 WhatsApp 发送消息</p>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="openStatusModal()"><i class="ti ti-tags"></i>分类</button>
        <button class="btn btn-primary" onclick="openAddModal()"><i class="ti ti-plus"></i>添加</button>
        <button class="btn" onclick="doLogout()"><i class="ti ti-logout"></i></button>
      </div>
    </div>

    <div class="stats" id="stats-row"></div>

    <div class="controls">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="search-input" placeholder="搜索店名、电话..." oninput="resetPageAndRender()">
      </div>
      <div class="filter-tabs" id="filter-tabs"></div>
    </div>

    <div class="user-list" id="user-list"></div>

    <div class="pagination" id="pagination-ctrl">
      <button class="btn" id="prev-page" onclick="changePage(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="page-info" id="page-info">第 1 页</span>
      <button class="btn" id="next-page" onclick="changePage(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
</div>

<div class="overlay" id="add-modal" onclick="bgClose(event,'add-modal')">
  <div class="modal">
    <h3 id="modal-title">用户信息</h3>
    <div class="form-group"><label>店名 *</label><input id="f-name" type="text"></div>
    <div class="form-group"><label>地址</label><input id="f-addr" type="text"></div>
    <div class="form-group"><label>电话 (WhatsApp 需填)</label><input id="f-phone" type="text" placeholder="例如: +393331234567"></div>
    <div class="form-group"><label>分类</label><select id="f-status"></select></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('add-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveUser()">保存</button>
    </div>
  </div>
</div>

<div class="overlay" id="status-modal" onclick="bgClose(event,'status-modal')">
  <div class="modal">
    <h3>分类管理</h3>
    <div id="status-list-ui" style="margin-bottom:15px"></div>
    <div class="add-status-row">
      <input id="new-status-name" type="text" placeholder="名称">
      <div class="color-opts" id="color-opts"></div>
      <button class="btn btn-primary" onclick="addStatus()">添加</button>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeModal('status-modal')">关闭</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIauAyJWlfqhDs8fIAjr-I6vtCG3EKCxc",
  authDomain: "bvsweb-83051.firebaseapp.com",
  projectId: "bvsweb-83051",
  storageBucket: "bvsweb-83051.firebasestorage.app",
  messagingSenderId: "449976422801",
  appId: "1:449976422801:web:79d0b243dc6fcf9df28a30"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let users = [], statuses = [];
let activeFilter = 'all', editingId = null;
let currentPage = 1;
const PAGE_SIZE = 100;

const COLORS = [
  { bg:'#FCEBEB', tx:'#791F1F', dot:'#E24B4A' }, // 红 (拒绝)
  { bg:'#E6F1FB', tx:'#0C447C', dot:'#378ADD' }, // 蓝
  { bg:'#E1F5EE', tx:'#085041', dot:'#1D9E75' }, // 绿
  { bg:'#FAEEDA', tx:'#633806', dot:'#BA7517' }, // 橙
  { bg:'#EEEDFE', tx:'#3C3489', dot:'#7F77DD' } 
];
let selectedColor = COLORS[0];

// ── Auth ──
window.doLogin = async () => {
  const pw = document.getElementById('login-pw').value;
  try { await signInWithEmailAndPassword(auth, 'admin@bvsweb.com', pw); } 
  catch(e) { alert('密码错误'); }
};
window.doLogout = () => signOut(auth);
window.togglePw = () => {
  const i = document.getElementById('login-pw');
  i.type = i.type === 'password' ? 'text' : 'password';
};

onAuthStateChanged(auth, user => {
  document.getElementById('login-page').style.display = user ? 'none' : 'flex';
  document.getElementById('app-page').style.display = user ? 'block' : 'none';
  if(user) {
    document.getElementById('authed-email').textContent = user.email;
    initApp();
  }
});

async function initApp() {
  const sSnap = await getDocs(collection(db, 'statuses'));
  if (sSnap.empty) {
    await addDoc(collection(db, 'statuses'), { label: '拒绝', color: COLORS[0], order: 99 });
  }
  onSnapshot(collection(db, 'statuses'), snap => {
    statuses = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(a.order||0)-(b.order||0));
    renderAll();
  });
  onSnapshot(query(collection(db, 'users'), orderBy('createdAt', 'desc')), snap => {
    users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });
}

// ── Render ──
function renderAll() {
  const statsHTML = [{label:'全部', val:users.length, dot:'#888'}, ...statuses.map(s=>({label:s.label, val:users.filter(u=>u.statusId===s.id).length, dot:s.color.dot}))];
  document.getElementById('stats-row').innerHTML = statsHTML.map(s=>`<div class="stat"><div class="stat-label"><span class="stat-dot" style="background:${s.dot}"></span>${s.label}</div><div class="stat-value">${s.val}</div></div>`).join('');
  
  const tabs = [{id:'all', label:'全部'}, ...statuses.map(s=>({id:s.id, label:s.label}))];
  document.getElementById('filter-tabs').innerHTML = tabs.map(t=>`<button class="ftab ${activeFilter===t.id?'active':''}" onclick="window._sf('${t.id}')">${t.label}</button>`).join('');
  renderList();
}

window.renderList = () => {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = users.filter(u => {
    const matchSearch = !q || [u.name, u.addr, u.phone].some(v => v?.toLowerCase().includes(q));
    const matchFilter = activeFilter === 'all' || u.statusId === activeFilter;
    return matchSearch && matchFilter;
  });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  const paged = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  document.getElementById('page-info').textContent = `第 ${currentPage} / ${totalPages} 页`;
  document.getElementById('prev-page').disabled = currentPage <= 1;
  document.getElementById('next-page').disabled = currentPage >= totalPages;

  const listEl = document.getElementById('user-list');
  if(!paged.length) { listEl.innerHTML='<div class="empty">无数据</div>'; return; }

  listEl.innerHTML = paged.map((u, i) => {
    const s = statuses.find(x=>x.id===u.statusId) || {label:'未分类', color:{bg:'#eee', tx:'#666'}};
    const mapUrl = u.placeId ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(u.name)}&query_place_id=${u.placeId}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(u.name + ' ' + (u.addr||''))}`;
    
    // WhatsApp URL 构造
    const cleanPhone = (u.phone || '').replace(/\D/g, '');
    const waText = encodeURIComponent(`CIAO ${u.name}, `);
    const waUrl = `https://api.whatsapp.com/send?phone=${cleanPhone}&text=${waText}`;

    return `
    <div class="user-card">
      <div class="avatar" style="background:${AVATAR_BG[i%6]};color:${AVATAR_TX[i%6]}">${(u.name||'?').slice(0,2)}</div>
      <div class="user-info">
        <div class="user-name" onclick="window.open('${mapUrl}','_blank')">${u.name} <i class="ti ti-map-2"></i></div>
        <div class="user-meta">
          <span><i class="ti ti-map-pin"></i>${u.addr || '无地址'}</span>
          <span><i class="ti ti-phone"></i>${u.phone || '无'}</span>
        </div>
      </div>
      <div class="actions">
        <span class="badge" style="background:${s.color.bg};color:${s.color.tx};margin-right:8px">${s.label}</span>
        ${u.phone ? `<button class="btn btn-wa" onclick="window.open('${waUrl}','_blank')"><i class="ti ti-brand-whatsapp"></i> WhatsApp</button>` : ''}
        <button class="icon-btn" onclick="window._eu('${u.id}')"><i class="ti ti-edit"></i></button>
        <button class="icon-btn danger" onclick="window._du('${u.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
};

// ── Helpers ──
window.resetPageAndRender = () => { currentPage = 1; renderList(); };
window.changePage = d => { currentPage += d; renderList(); window.scrollTo(0,0); };
window._sf = id => { activeFilter=id; currentPage=1; renderAll(); };
window._eu = id => {
  const u = users.find(x=>x.id===id); editingId=id;
  document.getElementById('f-name').value=u.name||'';
  document.getElementById('f-addr').value=u.addr||'';
  document.getElementById('f-phone').value=u.phone||'';
  refreshStatusSelect(u.statusId); openModal('add-modal');
};
window._du = async id => { if(confirm('确认删除？')) await deleteDoc(doc(db,'users',id)); };
window.saveUser = async () => {
  const data = {
    name: document.getElementById('f-name').value,
    addr: document.getElementById('f-addr').value,
    phone: document.getElementById('f-phone').value,
    statusId: document.getElementById('f-status').value
  };
  if(editingId) await updateDoc(doc(db,'users',editingId), data);
  else { data.createdAt=serverTimestamp(); await addDoc(collection(db,'users'), data); }
  closeModal('add-modal'); toast('已保存');
};
window.openStatusModal = () => { renderStatusListUI(); renderColorOpts(); openModal('status-modal'); };
window.addStatus = async () => {
  const label = document.getElementById('new-status-name').value;
  if(label) await addDoc(collection(db,'statuses'), {label, color:selectedColor, order:statuses.length});
  document.getElementById('new-status-name').value='';
};
window._ds = id => { if(!users.some(u=>u.statusId===id)) deleteDoc(doc(db,'statuses',id)); else alert('该分类有用户'); };
window._sc = i => { selectedColor=COLORS[i]; renderColorOpts(); };

function renderStatusListUI() {
  document.getElementById('status-list-ui').innerHTML = statuses.map(s=>`<div class="status-item-ui"><span>${s.label}</span> <button class="icon-btn danger" onclick="window._ds('${s.id}')"><i class="ti ti-x"></i></button></div>`).join('');
}
function renderColorOpts() {
  document.getElementById('color-opts').innerHTML = COLORS.map((c,i)=>`<div class="color-opt ${c===selectedColor?'sel':''}" style="background:${c.dot}" onclick="window._sc(${i})"></div>`).join('');
}
function refreshStatusSelect(selId) {
  document.getElementById('f-status').innerHTML = statuses.map(s=>`<option value="${s.id}" ${s.id===selId?'selected':''}>${s.label}</option>`).join('');
}
window.openAddModal = () => { editingId=null; refreshStatusSelect(); openModal('add-modal'); };
function openModal(id) { document.getElementById(id).classList.add('open'); }
window.closeModal = id => document.getElementById(id).classList.remove('open');
window.bgClose = (e,id) => { if(e.target.id===id) closeModal(id); };
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
const AVATAR_BG = ['#B5D4F4','#9FE1CB','#FAC775','#F4C0D1','#CECBF6','#C0DD97'], AVATAR_TX = ['#0C447C','#085041','#633806','#72243E','#3C3489','#27500A'];
</script>
</body>
</html>
